name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        go:
          - 1.23.x
          - 1.24.x
          - 1.25.x
          - 1.26.x
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: go test ./...
      - run: go vet ./...
      - run: go mod verify

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
          cache: true
      - run: go test -race ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
          cache: true
      - run: go test -coverprofile=coverage.out . ./prometheus
      - run: go tool cover -func=coverage.out
      - uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.out
      - uses: coverallsapp/github-action@v2
        with:
          file: coverage.out
          format: golang

  format-and-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
          cache: true
      - name: Check formatting
        run: go run ./cmd/checkfmt
      - run: ./demo.sh
